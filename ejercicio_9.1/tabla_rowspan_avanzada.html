<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusión de filas en HTML5: Uso de la etiqueta &lt;rowspan&gt;</title>
    <meta name="author" content="Juan Tenorio">
</head>

<body>
    <h1>Fusión de filas</h1>
    <p><a href="index.html">Volver atrás</a></p>
    <hr/>

    <p>Ejemplo de tabla avanzada con fusión de filas usando la etiqueta &lt;rowspan&gt;</p>
    <table border="1">
        <tr>
            <td>A</td>
            <td>B</td>
            <td rowspan="3">C</td>
            <td>D</td>
        </tr>
        <tr>
            <td rowspan="2">E</td>
            <td>F</td>
            <td rowspan="3">G</td>
        </tr>
        <tr>
            <td>H</td>
        </tr>
        <tr>
            <td>I</td>
            <td>J</td>
            <td>k</td>
        </tr>
    </table>  
</body>

</html>
