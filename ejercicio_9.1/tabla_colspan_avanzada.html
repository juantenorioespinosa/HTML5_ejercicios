<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusión de columnas en HTML5: Uso de la etiqueta &lt;colspan&gt;</title>
    <meta name="author" content="Juan Tenorio">
</head>

<body>
    <h1>Fusión de columnas</h1>
    <p><a href="index.html">Volver atrás</a></p>
    <hr/>

    <p>Ejemplo de tabla avanzada con fusión de columnas usando la etiqueta &lt;colspan&gt;</p>
    <table border="1">
        <tr>
            <td colspan="3">A</td>
            <td>B</td>
        </tr>
        <tr>
            <td>C</td>
            <td colspan="2">D</td>
            <td>E</td>
        </tr>
        <tr>
            <td colspan="4">F</td>
        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
            <td>J</td>
        </tr>
    </table>  
</body>

</html>
