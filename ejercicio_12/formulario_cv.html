<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios en HTML5: Selección múltiple y controles de fecha</title>
    <meta name="author" content="Juan Tenorio">
</head>

<body>
    <h1>Rellena tu CV</h1>
    <p><a href="index.html">Volver atrás</a></p>
    <hr/>

    <form action="" name="registro" method="get">
        <fieldset>
            <legend>Datos personales</legend>

            <p>
                <label for="province">Provicia</label><br>
                <select name="province" id="province" required>
                    <option value="">- selecciona -</option>
                    <option value="Cad">Cádiz</option>
                    <option value="Sev">Sevilla</option>
                    <option value="Mal">Málaga</option>
                </select>
            </p>
            
            <p>
                Fecha de nacimiento<br>
                <input type="number" name="day" value="" min="1" max="31" size="2" required> de
                <select name="month" id="month">
                    <option value="Jan">Enero</option>
                    <option value="Feb">Febrero</option>
                    <option value="Mar">Marzo</option>
                    <option value="Apr">Abril</option>
                    <option value="May">Mayo</option>
                    <option value="Jun">Junio</option>
                    <option value="Jul">Julio</option>
                    <option value="Aug">Agosto</option>
                    <option value="Sept">Septiembre</option>
                    <option value="Oct">Octubre</option>
                    <option value="Nov">Noviembre</option>
                    <option value="Dec">Diciembre</option>
                </select> de
                <input type="number" name="year" value="" min="1900" max="2026" size="4" required>
            </p>

            <p>
                <label for="interés">Temas de interés</label><br>
                <select name="interés" id="interés" multiple size="5" required>
                    <option value="bbdd">Administración de bases de datos</option>
                    <option value="dev">Análisis y programación</option>
                    <option value="arq">Arquitectura</option>
                    <option value="qua">Calidad</option>
                    <option value="erp_bi">ERP,CRM, Business Intelligence</option>
                    <option value="blockchain">Blockchain</option>
                    <option value="ia">Inteligencia Artificial</option>
                    <option value="cybersecurity">Ciberseguridad</option>
                    <option value="languages">Idiomas</option>
                    <option value="typing">Mecanografía</option>
                </select>
            </p>
        </fieldset>

        <p><button>Enviar</button></p>

    </form> 
</body>

</html>
