<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios en HTML5: Subida de archivos y el atributo enctype</title>
    <meta name="author" content="Juan Tenorio">
</head>

<body>
    <h1>Información sobre el producto</h1>
    <p><a href="index.html">Volver atrás</a></p>
    <hr/>

    <form action="" name="product_info" method="post" enctype="multipart/form-data">
        <fieldset>
            <legend>Datos básicos</legend>
            
            <p>
                <label for="name">Nombre</label><br>
                <input type="text" name="name" value="" id="name" required>
            </p>
            
            <p>
                <label for="description">Descripción</label><br>
                <textarea name="description" id="description" rows="6" cols="60"></textarea>
            </p>
            
            <p>
                <label for="photo">Foto</label>
                <input type="file" name="photo" id="photo">
            </p>

            <p>
                <input type="checkbox" name="counter" value="yes" id="counter">
                <label for="counter" >Añadir contador de visitas</label>
            </p>
        </fieldset>

        <fieldset>
            <legend>Datos económicos</legend>

            <p>
                <label for="price">Precio</label>
                <input type="number" name="price" value="" id="price" min="0" max="9999"> € &nbsp;
                <label for="taxes">Impuestos</label>
                <select name="taxes" id="taxes">
                    <option value="">-</option>
                    <option value="4">4%</option>
                    <option value="7">7%</option>
                    <option value="16">16%</option>
                    <option value="25">25%</option>
                </select>
            </p>

            <p>
                Promoción<br>
                <input type="radio" name="promocion" value="none" id="nothing">
                <label for="nothing">Ninguno</label><br>
                <input type="radio" name="promocion" value="free_shiping" id="free">
                <label for="free">Transporte gratuito</label><br>
                <input type="radio" name="promocion" value="dicount_5" id="5discount">
                <label for="5discount">Descuento 5%</label>
            </p>
        </fieldset>

        <p>
            <button>Enviar</button>
        </p>
    </form>
</body>

</html>
