    <main>
        <section>
            <h1>Crea tu cuenta de estudiante</h1>

            <form action="procesar-registro.php" name="registro" method="post" enctype="multipart/form-data">
                <fieldset>
                    <legend>Datos personales</legend>

                    <p>
                        <label for="fullname">Nombre y apellidos</label><br>
                        <input type="text" name="fullname" value="" id="fullname" required maxlength="50">
                    </p>
                    
                    <p>
                        <label for="bdate">Fecha de nacimiento</label><br>
                        <input type="date" name="bdate" value="" id="bdate" required>
                    </p>

                    <p>
                        <label for="email">Email</label><br>
                        <input type="email" name="email" value="" id="email" placeholder="correo@gmail.com" required maxlength="30" size="25">
                    </p>

                    <p>
                        <label for="adress">Dirección</label><br>
                        <input type="text" name="adress" value="" id="adress" placeholder="Ingresa tu dirección postal" required maxlength="100" size="50">
                    </p>
                </fieldset>
                
                <fieldset>
                    <legend>Información adicional</legend>

                    <p>
                        <label for="website">Página web</label><br>
                        <input type="url" name="website" id="website" placeholder="https://tu-sitio.com">
                    </p>

                    <p>
                        <label for="photo">Foto</label><br>
                        <input type="file" name="photo" id="photo" accept="image/*">
                    </p>

                    <p>
                        <label for="bio">Biografía</label><br>
                        <textarea name="bio" id="bio" rows="5" cols="50" placeholder="Cuéntanos un poco sobre ti y tu experiencia..."></textarea>
                    </p>
                </fieldset>

                <p>
                    <button type="submit">Enviar registro</button>
                    <button type="reset">Limpiar formulario</button>
                </p>
            </form>

            <hr />
        </section>
