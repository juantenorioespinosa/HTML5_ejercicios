        <section>
            <h1>Acceso para Estudiantes</h1>

            <form action="procesar-login.php" name="acceso" method="post">
                <fieldset>
                    <legend>Inicia sesión</legend>

                    <p>
                        <label for="email">Email</label><br>
                        <input 
                            type="email" 
                            name="email"
                            value="" 
                            id="email" 
                            required 
                            maxlength="50" 
                            size="25">
                    </p>
                    
                    <p>
                        <label for="key">Password</label><br>
                        <input 
                            type="password" 
                            name="key" 
                            value="" 
                            id="key" 
                            required 
                            minlength="8" 
                            placeholder="Mínimo 8 caracteres"
                            size="25">
                    </p>
                </fieldset>

                <p><button type="submit">Acceder</button></p>
            </form>

            <hr />
        </section>
