<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Título para el navegador y los buscadores -->
    <title>Contenido multimedia en HTML5: Atributo name de la etiqueta &lt;iframe&gt;</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="cambiar dinámicamente el contenido de un &lt;iframe&gt; usando un enlace &lt;a&gt;">

    <!-- Autor de la página -->
    <meta name="author" content="Juan Tenorio">

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Codificación-->
    <meta charset="UTF-8">

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf">

</head>

<body>
    <header>
        <h1>Etiqueta &lt;iframe&gt; con atributo <code>name</code></h1>
        <p><a href="index.html">Volver atrás</a></p>
        <hr/>
    </header>
    
    <main>
        <p>Selecciona el contenido que quieres mostrar en el iframe:</p>
        <nav>
            <ul>
                <li><a href="https://oregoom.com/html/iframe/" target="myIframe">Documentación de la etiqueta &lt;iframe&gt;</a></li>
                <li><a href="https://oregoom.com/html/video/" target="myIframe">Documentación de la etiqueta &lt;video&gt;</a></li>
                <li><a href="https://oregoom.com/html/audio/" target="myIframe">Documentación de la etiqueta &lt;audio&gt;</a></li>
            </ul>
        </nav>
        <iframe src=""
            name="myIframe"
            title="Documentación de las etiquetas &lt;iframe&gt;, &lt;video&gt; y &lt;audio&gt;"
            width="800"
            height="500">
        </iframe>
    </main> 
</body>

</html>
