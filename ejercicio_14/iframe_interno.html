<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Título para el navegador y los buscadores -->
    <title>Contenido multimedia en HTML5: La etiqueta &lt;iframe&gt;</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Como insertar la etiqueta &lt;iframe&gt; con contenido interno en una página web">

    <!-- Autor de la página -->
    <meta name="author" content="Juan Tenorio">

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Codificación-->
    <meta charset="UTF-8">

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Para algunos navegadores móviles -->

</head>

<body>
    <header>
        <h1>Etiqueta &lt;iframe&gt; con contenido interno</h1>
        <p><a href="index.html">Volver atrás</a></p>
        <hr/>
    </header>
    
    <main>
        <iframe src="formulario_registro.html"
            title="Formulario en HTML5"
            width="600"
            height="500">
        </iframe>
    </main>

</html>
