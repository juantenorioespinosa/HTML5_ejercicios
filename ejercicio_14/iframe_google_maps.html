<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Título para el navegador y los buscadores -->
    <title>Google Maps en HTML5: La etiqueta &lt;iframe&gt;</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Como insertar googlemaps usando la etiqueta &lt;iframe&gt;">

    <!-- Autor de la página -->
    <meta name="author" content="Juan Tenorio">

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Codificación-->
    <meta charset="UTF-8">

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf">

</head>

<body>
    <header>
        <h1>Etiqueta &lt;iframe&gt; con mapa de google</h1>
        <p><a href="index.html">Volver atrás</a></p>
        <hr/>
    </header>
    
    <main>
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d32100.04083742792!2d-9.069671629062052!3d53.27431063159388!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2ses!4v1775022486750!5m2!1ses!2ses" 
                width="800" 
                height="600" 
                style="border:0;"  
                loading="eager" 
                referrerpolicy="no-referrer-when-downgrade">
        </iframe>
        
    </main>  
</body>

</html>
