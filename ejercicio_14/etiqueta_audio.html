<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Título para el navegador y los buscadores -->
    <title>Contenido multimedia en HTML5: Uso de la etiqueta &lt;audio&gt;</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Como insertar archivos de audio en un documento html con la etiqueta &lt;audio&gt;">

    <!-- Autor de la página -->
    <meta name="author" content="Juan Tenorio">

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Codificación-->
    <meta charset="UTF-8">

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf">

</head>

<body>
    <header>
        <h1>La etiqueta <code>&lt;audio&gt;</code></h1>
        <p><a href="index.html">Volver atrás</a></p>
        <hr/>
    </header>
    
    <main>
        <p>Documentación de la etiqueta <code>audio</code></p>
        <audio controls>
            <source src="./assets/audios/mas_alla_del_boton_play.mp3" type="audio/mp3">
            <source src="./assets/audios/mas_alla_del_boton_play.aac" type="audio/aac">
            <source src="./assets/audios/mas_alla_del_boton_play.flac" type="audio/flac">
            Tu navegador no soporta los formatos de audio .mp3/.aac/.flac
        </audio>
    </main> 
</body>

</html>
