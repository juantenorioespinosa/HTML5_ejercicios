<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Título para el navegador y los buscadores -->
    <title>Contenido multimedia en HTML5: La etiqueta &lt;iframe&gt;</title>

    <!-- Descripción de la página para los buscadores -->
    <meta name="description" content="Como insertar videos de youtube usando la etiqueta &lt;iframe&gt;">

    <!-- Autor de la página -->
    <meta name="author" content="Juan Tenorio">

    <!-- Favicon de la página -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Codificación-->
    <meta charset="UTF-8">

    <!-- Para que la web sea responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Para algunos navegadores móviles -->
    <meta name="theme-color" content="#1e7bbf">

</head>

<body>
    <header>
        <h1>Etiqueta &lt;iframe&gt; con contenido de youtube</h1>
        <p><a href="index.html">Volver atrás</a></p>
        <hr/>
    </header>
    
    <main>
        <iframe
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/Pixf6U7x-18?si=jdYVR1NXvkjUUm4p&autoplay=1&mute=1" 
            title="YouTube video player" 
            allow="autoplay; picture-in-picture"
            allowfullscreen>
        </iframe>
    </main>  
</body>

</html>
